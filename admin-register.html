<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta Admin — COR & FLOR</title>
  <link rel="icon" type="image/png" href="assets/logo-nova.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose:#D4679A; --rose-deep:#9B3068; --rose-soft:#F4C9D8;
      --cream:#FDF8F5; --ink:#1C1414; --warm-gray:#4A4040;
      --serif:'Playfair Display',serif; --sans:'Raleway',sans-serif;
      --ease:cubic-bezier(0.25,0.46,0.45,0.94);
    }
    body {
      font-family: var(--sans);
      background: var(--cream);
      min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content:''; position:absolute; width:700px; height:700px;
      background: radial-gradient(circle, rgba(212,103,154,.14) 0%, transparent 70%);
      top:-250px; right:-200px; pointer-events:none;
    }
    body::after {
      content:''; position:absolute; width:500px; height:500px;
      background: radial-gradient(circle, rgba(155,48,104,.09) 0%, transparent 70%);
      bottom:-150px; left:-150px; pointer-events:none;
    }
    .bg-petal {
      position:absolute; pointer-events:none; opacity:.07;
      animation: floatPetal 18s ease-in-out infinite;
    }
    .bg-petal:nth-child(1){ width:140px; top:8%; left:5%; animation-duration:16s; }
    .bg-petal:nth-child(2){ width:100px; top:65%; left:3%; animation-duration:22s; animation-delay:-4s; }
    .bg-petal:nth-child(3){ width:120px; top:20%; right:4%; animation-duration:20s; animation-delay:-8s; }
    .bg-petal:nth-child(4){ width:80px; bottom:10%; right:8%; animation-duration:14s; animation-delay:-2s; }
    @keyframes floatPetal {
      0%,100%{ transform: translate(0,0) rotate(0deg); }
      33%    { transform: translate(20px,-18px) rotate(20deg); }
      66%    { transform: translate(-14px,22px) rotate(-15deg); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 52px;
      width: 100%; max-width: 460px;
      box-shadow: 0 40px 100px -24px rgba(28,20,20,.2), 0 0 0 1px rgba(212,103,154,.1);
      position: relative; z-index: 1;
      animation: cardIn .75s var(--ease) forwards;
    }
    .login-logo {
      display:flex; flex-direction:column; align-items:center;
      margin-bottom: 28px; text-align:center; gap: 10px;
    }
    .login-logo__img {
      max-width: 170px; height:auto; display:block;
      mix-blend-mode: multiply;
      filter: drop-shadow(0 3px 14px rgba(155,48,104,.28));
    }
    .login-logo__badge {
      display:inline-block; font-size:10px; letter-spacing:3.5px;
      text-transform:uppercase; color:var(--rose); font-weight:500;
      background: rgba(212,103,154,.08); padding:5px 14px;
      border-radius:999px; border:1px solid rgba(212,103,154,.2);
    }
    .login-rule { width:48px; height:1px; background:var(--rose-soft); margin:0 auto 24px; }

    .invite-badge {
      background: rgba(22,163,74,.07); border: 1px solid rgba(22,163,74,.2);
      color: #15803d; border-radius: 10px; padding: 10px 14px;
      font-size: 12px; text-align: center; margin-bottom: 20px;
      display: none;
    }
    .invite-badge.show { display: block; }
    .invite-badge code {
      font-weight: 600; letter-spacing: 2px; background: rgba(22,163,74,.12);
      padding: 2px 7px; border-radius: 5px;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display:block; font-size:11px; letter-spacing:2.4px;
      text-transform:uppercase; color:var(--warm-gray); font-weight:500;
      margin-bottom:8px;
    }
    .form-input {
      width:100%; padding:14px 18px;
      border:1.5px solid rgba(212,103,154,.22);
      border-radius:12px; font-family:var(--sans); font-size:14px;
      color:var(--ink); background:var(--cream); outline:none;
      transition: border-color .3s var(--ease), box-shadow .3s var(--ease);
    }
    .form-input:focus {
      border-color:var(--rose);
      box-shadow: 0 0 0 4px rgba(212,103,154,.1);
    }
    .form-input::placeholder { color:rgba(74,64,64,.4); }
    .form-input:disabled { opacity:.5; cursor:not-allowed; }

    .login-btn {
      width:100%; padding:15px; margin-top:8px;
      background:var(--rose); color:#fff; border:none; border-radius:12px;
      font-family:var(--sans); font-size:12px; font-weight:600;
      letter-spacing:2.8px; text-transform:uppercase; cursor:pointer;
      transition: background .3s var(--ease), transform .15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .login-btn:hover  { background:var(--rose-deep); }
    .login-btn:active { transform:scale(.98); }
    .login-btn:disabled { opacity:.6; cursor:not-allowed; }

    .login-error {
      display:none; margin-top:14px; padding:11px 16px;
      background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.18);
      color:#dc2626; border-radius:10px; font-size:13px; text-align:center;
    }
    .login-error.show { display:block; }

    .login-success {
      display:none; margin-top:14px; padding:16px;
      background:rgba(22,163,74,.07); border:1px solid rgba(22,163,74,.2);
      color:#15803d; border-radius:10px; font-size:13px; text-align:center;
    }
    .login-success.show { display:block; }

    .login-foot {
      margin-top:24px; text-align:center;
      font-size:12px; color:rgba(74,64,64,.5);
    }
    .login-foot a { color:var(--rose-deep); text-decoration:none; }
    .login-foot a:hover { text-decoration:underline; }

    .loading-state {
      text-align:center; padding:40px 0;
      color:var(--warm-gray); font-size:14px;
    }
    .loading-state svg { animation: spin .8s linear infinite; }

    .invalid-state {
      text-align:center; padding:20px 0;
    }
    .invalid-state__icon {
      font-size:42px; margin-bottom:12px; opacity:.4;
    }
    .invalid-state h3 {
      font-family:var(--serif); font-size:18px; margin-bottom:8px;
      color:var(--ink);
    }
    .invalid-state p { font-size:13px; color:var(--warm-gray); }

    @media(max-width:480px){
      .login-card { padding:40px 26px; margin:16px; }
    }
  </style>
</head>
<body>

<svg class="bg-petal" viewBox="-50 -50 100 100" style="color:#D4679A"><g fill="currentColor"><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(0)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(45)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(90)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(135)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(180)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(225)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(270)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(315)"/></g><circle cx="0" cy="0" r="4.5" fill="#FDF8F5"/><circle cx="0" cy="0" r="2.2" fill="currentColor"/></svg>
<svg class="bg-petal" viewBox="-50 -50 100 100" style="color:#9B3068"><g fill="currentColor"><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(0)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(60)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(120)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(180)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(240)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(300)"/></g></svg>
<svg class="bg-petal" viewBox="-50 -50 100 100" style="color:#D4679A"><g fill="currentColor"><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(0)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(90)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(180)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(270)"/></g></svg>
<svg class="bg-petal" viewBox="-50 -50 100 100" style="color:#C4956A"><g fill="currentColor"><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(0)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(45)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(90)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(135)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(180)"/><path d="M 0,-4 C -10,-6 -20,-18 -16,-32 C -10,-44 4,-44 6,-32 C 8,-22 6,-12 0,-4 Z" transform="rotate(225)"/></g></svg>

<div class="login-card">
  <div class="login-logo">
    <img src="assets/logo-nova.png" class="login-logo__img" alt="COR &amp; FLOR">
    <div class="login-logo__badge">✦ Cadastro de Administrador</div>
  </div>

  <div class="login-rule"></div>

  <!-- Loading state -->
  <div class="loading-state" id="state-loading">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    <p style="margin-top:12px">Validando código de convite...</p>
  </div>

  <!-- Invalid invite state -->
  <div class="invalid-state" id="state-invalid" style="display:none">
    <div class="invalid-state__icon">🔐</div>
    <h3>Convite inválido ou expirado</h3>
    <p>Este link de convite não é válido. Solicite um novo convite ao administrador da loja.</p>
    <div class="login-foot" style="margin-top:20px">
      <a href="admin-login.html">← Ir para o login</a>
    </div>
  </div>

  <!-- Register form -->
  <div id="state-form" style="display:none">
    <div class="invite-badge show" id="invite-badge"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Seu nome</label>
        <input type="text" id="name" class="form-input" placeholder="Nome completo" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirmar senha</label>
        <input type="password" id="password2" class="form-input" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button type="submit" class="login-btn" id="register-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Criar conta de administrador
      </button>
      <div class="login-error" id="register-error"></div>
    </form>

    <div class="login-success" id="register-success">
      ✓ Conta criada com sucesso! Redirecionando para o painel...
    </div>

    <div class="login-foot">
      <a href="admin-login.html">← Já tenho conta</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js?v=3"></script>
<script>
  const ICON_SPIN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;
  const ICON_OK   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>`;

  let inviteCode = null;

  function showState(id) {
    ['state-loading','state-invalid','state-form'].forEach(s => {
      document.getElementById(s).style.display = s === id ? '' : 'none';
    });
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = (params.get('code') || '').trim().toUpperCase();

    if (!code) { showState('state-invalid'); return; }

    // Valida o convite via função segura (não expõe a lista de códigos).
    // Fallback para o SELECT antigo enquanto o SQL de segurança não rodar.
    let valid = false;
    const rpc = await sb.rpc('check_admin_invite', { p_code: code });
    if (!rpc.error) {
      valid = rpc.data === true;
    } else {
      const { data } = await sb.from('admin_invites')
        .select('id, code, expires_at')
        .eq('code', code)
        .eq('used', false)
        .single();
      valid = !!data && (!data.expires_at || new Date(data.expires_at) >= new Date());
    }

    if (!valid) { showState('state-invalid'); return; }

    inviteCode = code;
    document.getElementById('invite-badge').innerHTML =
      `✓ Convite válido: <code>${inviteCode}</code>`;
    showState('state-form');
  }

  init();

  document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!inviteCode) return;

    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const pass2 = document.getElementById('password2').value;
    const errEl = document.getElementById('register-error');
    const btn   = document.getElementById('register-btn');

    errEl.classList.remove('show');

    if (!name || !email || !pass) {
      errEl.textContent = 'Preencha todos os campos.';
      errEl.classList.add('show'); return;
    }
    if (pass.length < 6) {
      errEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
      errEl.classList.add('show'); return;
    }
    if (pass !== pass2) {
      errEl.textContent = 'As senhas não coincidem.';
      errEl.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = ICON_SPIN + ' Criando conta...';

    // Sign up
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { name } }
    });

    if (signUpErr || !signUpData?.user) {
      errEl.textContent = signUpErr?.message || 'Erro ao criar conta. Tente novamente.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Criar conta de administrador`;
      return;
    }

    if (!signUpData.session) {
      // Email confirmation required
      errEl.style.cssText = 'display:block;background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.3);color:#b45309';
      errEl.textContent = 'Verifique seu e-mail para confirmar o cadastro. Após confirmar, entre em contato com o administrador para ativar o acesso.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Criar conta de administrador`;
      return;
    }

    // Use invite + set is_admin via SECURITY DEFINER function
    const { data: ok, error: rpcErr } = await sb.rpc('use_admin_invite', {
      p_code: inviteCode,
      p_user_id: signUpData.user.id
    });

    if (!ok || rpcErr) {
      errEl.textContent = 'Conta criada, mas houve um erro ao ativar o convite. Fale com o administrador.';
      errEl.classList.add('show');
      btn.disabled = false;
      return;
    }

    // Success
    btn.innerHTML = ICON_OK + ' Conta criada!';
    document.getElementById('register-success').classList.add('show');
    sessionStorage.setItem('cf_admin_logged', 'true');
    sessionStorage.setItem('cf_admin_user', name || email);
    setTimeout(() => { window.location.href = 'admin.html'; }, 2000);
  });

  document.querySelectorAll('.form-input').forEach(el =>
    el.addEventListener('input', () =>
      document.getElementById('register-error').classList.remove('show')
    )
  );
</script>
</body>
</html>
